<div class="banner-modal">
    <div class="modal-header">
        <h2 mat-dialog-title>Thêm Banner Mới</h2>
        <button mat-icon-button class="close-btn" (click)="cancel()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <mat-dialog-content class="modal-content">

        <!-- Image Upload -->
        <div class="image-upload-section">
            <div *ngIf="!imagePreview" class="upload-placeholder" (click)="imageInput.click()">
                <mat-icon>add_photo_alternate</mat-icon>
                <span>Chọn ảnh banner</span>
            </div>

            <div *ngIf="imagePreview" class="image-preview-wrapper">
                <img [src]="imagePreview" class="image-preview" alt="banner preview" />
                <div class="image-overlay">
                    <button mat-icon-button (click)="imageInput.click()" matTooltip="Thay ảnh">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="removeImage()" matTooltip="Xóa ảnh">
                        <mat-icon>delete</mat-icon>
                    </button>
                </div>
            </div>

            <mat-progress-bar *ngIf="isUploading" mode="indeterminate"></mat-progress-bar>
            <input #imageInput type="file" accept="image/*" hidden (change)="onImageSelected($event)" />
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Thứ tự hiển thị</mat-label>
            <input matInput type="number" [(ngModel)]="banner.order" placeholder="0" />
            <mat-hint>Số nhỏ hơn hiển thị trước</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Liên kết khi nhấn (tùy chọn)</mat-label>
            <input matInput [(ngModel)]="banner.link" placeholder="https://..." />
        </mat-form-field>

        <mat-slide-toggle [(ngModel)]="banner.isActive">
            Hiển thị ngay
        </mat-slide-toggle>

    </mat-dialog-content>

    <mat-dialog-actions class="modal-actions">
        <button mat-button (click)="cancel()">Hủy</button>
        <button mat-raised-button color="primary" (click)="create()" [disabled]="!isValid()">
            <mat-icon>check</mat-icon>
            Thêm Banner
        </button>
    </mat-dialog-actions>
</div>
